<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulaire de Contact</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="form-container">
        <h1>Formulaire de contact</h1>

        <form action="#" method="POST">

            <div class="form-group">
                <label for="pseudo">Votre Pseudo *</label>
                <input type="text" id="pseudo" name="pseudo" required placeholder="Ex: JeanDupont">
            </div>

            <div class="form-group">
                <label for="password">Votre Mot de passe *</label>
                <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>

            <div class="form-group">
                <label for="email">Votre adresse e-mail *</label>
                <input type="email" id="email" name="email" required placeholder="exemple@domaine.com">
            </div>

            <div class="form-group">
                <label for="objet">Objet du message *</label>
                <select id="objet" name="objet" required>
                    <option value="" disabled selected>Choisissez une option</option>
                    <option value="question">J'ai une question</option>
                    <option value="suggestion">Je fais une suggestion</option>
                    <option value="probleme">Je rencontre un problème</option>
                    <option value="autre">Autre</option>
                </select>
            </div>

            <fieldset class="form-group radio-fieldset">
                <legend class="label-like">Niveau d'urgence *</legend>
                <div class="radio-group">
                    <div class="radio-item">
                        <input type="radio" id="urg-urgent" name="urgence" value="urgent">
                        <label for="urg-urgent">Urgent</label>
                    </div>
                    <div class="radio-item">
                        <input type="radio" id="urg-normal" name="urgence" value="normal">
                        <label for="urg-normal">Normal</label>
                    </div>
                    <div class="radio-item">
                        <input type="radio" id="urg-lent" name="urgence" value="lent" checked>
                        <label for="urg-lent">Lent</label>
                    </div>
                </div>
            </fieldset>

            <div class="form-group">
                <label for="message">Votre message *</label>
                <textarea id="message" name="message" rows="5" required
                    placeholder="Écrivez votre message ici..."></textarea>
            </div>

            <div class="form-group checkbox-group">
                <input type="checkbox" id="privacy" name="privacy" required>
                <label for="privacy">J'ai lu et j'accepte la politique de confidentialité du site. *</label>
            </div>

            <button type="submit" class="btn-submit">Envoyer</button>

        </form>
    </main>

</body>

</html>
